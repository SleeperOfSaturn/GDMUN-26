<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Press Portfolios — GDMUN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific overrides for the table to match the glassmorphism aesthetic */
        .portfolio-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px; /* Creates spacing between rows for the card look */
            margin-top: 2rem;
        }

        .portfolio-table th {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            opacity: 0.6;
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .portfolio-table td {
            padding: 1.2rem 1rem;
            background: rgba(255, 255, 255, 0.03); /* Subtle glass fill */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Rounding the corners of the "glass cards" */
        .portfolio-table tr td:first-child {
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        .portfolio-table tr td:last-child {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .portfolio-table tr:hover td {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <div id="header"></div>

    <section class="landing-extra">
        <div class="background"></div>
        <div class="layout">
            <div></div>
            <div class="hero" style="text-align:center; max-width:none;">
                <h1>INTERNATIONAL PRESS</h1>
            </div>
        </div>
    </section>

    <section class="bullcrap">
        <div class="contact-container" style="max-width: 1000px;">
            <h3>Portfolio Matrix</h3>
            <table class="portfolio-table">
                <thead>
                    <tr>
                        <th>S No.</th>
                        <th>Portfolio</th>
                        <th>Party</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td>Photographer</td></tr>
                    <tr><td>2</td><td>Journalist</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="bottom">
        <div class="footnote">Website by: SleeperOfSaturn</div>
    </section>

    <script src="main.js"></script>
</body>
</html>
