<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — GDMUN</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="header"></div>

<section class="landing">

<div class="background"></div>

<div class="layout">

<div></div>

<div class="hero" style="text-align:center; max-width:none;">
<h1>REGISTER</h1>
</div>

</div>

</section>



<section class="bullcrap">

<div class="register-container">

<h3>Delegate Registration</h3>

<form class="register-form">

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>School / Institution</label>
<input type="text" placeholder="Enter your school">

<label>Committee Preference</label>
<select>
<option>United Nations Security Council</option>
<option>UN Human Rights Council</option>
<option>World Health Organization</option>
</select>

<button type="submit">Submit Registration</button>

</form>

</div>

</section>



<section class="bottom">
<div class="footnote">Website by: SleeperOfSaturn</div>
</section>

<script src="main.js"></script>

</body>
</html>
